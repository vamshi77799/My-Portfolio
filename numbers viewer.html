<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Viewer</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --toolbar-bg: rgba(245, 245, 247, 0.95);
            --border-color: #e5e5ea;
            --text-main: #1d1d1f;
            --font-stack: "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevent body scroll, let PDF scroll */
        }

        /* --- TOOLBAR --- */
        .toolbar {
            height: 60px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0; /* Prevent toolbar from shrinking */
        }

        .toolbar-left { display: flex; align-items: center; gap: 16px; }
        
        .btn-close {
            text-decoration: none;
            color: #0071e3;
            font-weight: 500;
            font-size: 16px;
        }

        .file-title {
            font-weight: 600;
            font-size: 17px;
        }

        .toolbar-right { display: flex; gap: 12px; }

        /* --- ACTION BUTTONS --- */
        .btn-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-numbers {
            background-color: #34c759;
            color: white;
        }
        
        .btn-pdf {
            background-color: #ff3b30;
            color: white;
        }

        .btn-action:hover { opacity: 0.85; }
        .btn-action svg { width: 14px; height: 14px; fill: currentColor; }

        /* --- PDF VIEWER CONTAINER --- */
        .pdf-container {
            flex: 1;
            background: #525659; /* Standard PDF viewer background grey */
            display: flex;
            justify-content: center;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading */
        .status-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30,30,30,0.9); padding: 20px 30px; border-radius: 16px;
            text-align: center; color: white; display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="toolbar">
        <div class="toolbar-left">
            <a href="numbers.html" class="btn-close">Done</a>
            <span class="file-title" id="doc-title">Loading...</span>
        </div>
        <div class="toolbar-right">
            <a id="link-numbers" href="#" class="btn-action btn-numbers" download>
                <svg viewBox="0 0 24 24"><path d="M4 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 2v14h14V5H4zm4 4h6v2H8V9zm0 4h6v2H8v-2z"/></svg>
                .numbers
            </a>
            <a id="link-pdf" href="#" class="btn-action btn-pdf" download>
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H8l4-4 4 4h-3v4h-2zm1-9c-2.21 0-4-1.79-4-4h8c0 2.21-1.79 4-4 4z"/></svg>
                Download PDF
            </a>
        </div>
    </div>

    <div class="pdf-container">
        <div id="loading-box" class="status-msg">
            <div class="spinner"></div>
            <span style="font-size:14px; color:#ccc;">Loading PDF...</span>
        </div>
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <script>
        // 1. Get the file name from the URL (e.g., ?file=NACA 4412)
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file') || 'NACA 4412'; 

        // 2. Set Title
        document.getElementById('doc-title').textContent = fileName;
        document.title = fileName + " | Viewer";

        // 3. Define Paths (Files must be in 'python/numbers/')
        const basePath = "python/numbers/";
        const pdfPath = basePath + fileName + ".pdf";
        const numbersPath = basePath + fileName + ".numbers";

        // 4. Update Links and Viewer
        document.getElementById('link-numbers').href = numbersPath;
        document.getElementById('link-pdf').href = pdfPath;
        
        // Load the PDF into the iframe with loading state
        const pdfFrame = document.getElementById('pdf-frame');
        pdfFrame.onload = () => { document.getElementById('loading-box').style.display = 'none'; };
        pdfFrame.src = pdfPath;
    </script>
</body>
</html>
