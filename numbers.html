<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers | Vamshi Krishna</title>
    <style>
        :root {
            --bg-color: #f2f2f7; /* Apple System Gray 6 */
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-green: #34c759; /* Numbers Green */
            --accent-blue: #0071e3;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --font-stack: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- HEADER --- */
        header {
            max-width: 1000px;
            margin: 0 auto 40px auto;
            text-align: center;
            animation: fadeUp 0.8s ease forwards;
            opacity: 0;
        }

        .nav-back-home {
            position: absolute; top: 40px; right: 40px;
            display: flex; align-items: center; gap: 5px;
            color: var(--accent-blue); text-decoration: none; font-weight: 500;
        }
        .nav-back-home:hover { text-decoration: underline; }

        h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { font-size: 18px; color: var(--text-secondary); margin-top: 5px; }

        /* --- GRID LAYOUT --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeUp 0.8s ease forwards 0.2s;
            opacity: 0;
        }

        /* --- FILE CARD --- */
        .file-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #34c759, #30b0c7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3);
        }

        .icon-container svg { width: 40px; height: 40px; fill: white; }

        .file-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .file-meta { font-size: 14px; color: var(--text-secondary); }

        .tag {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #f2f2f7;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-back-home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>

    <header>
        <h1>Numbers</h1>
        <div class="subtitle">Airfoil Data & Calculation Sheets</div>
    </header>

    <div class="grid">
        <a href="numbers viewer.html?file=NACA 4412" class="file-card">
            <div class="tag">Sheet</div>
            <div class="icon-container">
                <svg viewBox="0 0 24 24"><path d="M4 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 2v14h14V5H4zm2 2h2v2H6V7zm0 4h2v2H6v-2zm0 4h2v2H6v-2zm4-8h6v2h-6V7zm0 4h6v2h-6v-2zm0 4h6v2h-6v-2z"/></svg>
            </div>
            <div class="file-name">NACA 4412</div>
            <div class="file-meta">Airfoil Coordinates & Lift Data</div>
        </a>

        <a href="numbers viewer.html?file=NACA 9412" class="file-card">
            <div class="tag">Sheet</div>
            <div class="icon-container">
                <svg viewBox="0 0 24 24"><path d="M4 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm0 2v14h14V5H4zm2 2h2v2H6V7zm0 4h2v2H6v-2zm0 4h2v2H6v-2zm4-8h6v2h-6V7zm0 4h6v2h-6v-2zm0 4h6v2h-6v-2z"/></svg>
            </div>
            <div class="file-name">NACA 9412</div>
            <div class="file-meta">Airfoil Coordinates & Lift Data</div>
        </a>
    </div>

</body>
</html>
