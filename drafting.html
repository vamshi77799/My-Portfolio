<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafting & GD&T | Vamshi Krishna</title>
    
    <style>
        /* =========================================
           1. LIBRARY STYLES (From cam.html)
           ========================================= */
        :root {
            --bg-color: #fbfbfd;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0071e3;
            --card-gradient: linear-gradient(180deg, #f5f5f7 0%, #e1e1e6 100%);
            --card-border: 1px solid rgba(255,255,255,0.8);
            --shadow-soft: 0 4px 6px rgba(0,0,0,0.02), 0 10px 15px rgba(0,0,0,0.03);
            --font-stack: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        #library-view {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeUp 0.6s ease forwards;
        }

        /* --- HEADER & NAVIGATION --- */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 42px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.015em; }
        .header p { font-size: 19px; color: var(--text-secondary); }

        .nav-back-home {
            position: absolute; top: 40px; right: 40px;
            display: flex; align-items: center; gap: 5px;
            color: var(--accent-blue); text-decoration: none; font-weight: 500;
        }
        .nav-back-home:hover { text-decoration: underline; }

        /* --- CONTROLS CONTAINER (Adapted to cam.html theme) --- */
        .controls-wrapper {
            max-width: 900px; margin: 0 auto 50px; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
        }

        .segmented-control {
            background: rgba(0,0,0,0.04);
            padding: 4px; border-radius: 12px;
            display: inline-flex; position: relative;
        }
        
        .segment-btn {
            border: none; background: transparent; padding: 8px 24px;
            font-size: 14px; font-weight: 500; color: var(--text-secondary);
            cursor: pointer; position: relative; z-index: 2;
            width: 120px; text-align: center;
            transition: color 0.2s;
        }
        
        .segment-btn.active { font-weight: 600; color: var(--text-main); }
        
        .segment-pill {
            position: absolute; top: 4px; bottom: 4px; left: 4px;
            background: #fff; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06);
            width: calc(120px - 8px); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1; pointer-events: none;
        }

        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; width: 16px; }
        .search-input { width: 100%; padding: 12px 16px 12px 40px; font-size: 15px; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; background: #fff; color: var(--text-main); transition: all 0.2s; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .search-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(0,113,227,0.15); }

        /* --- GRID AND CARDS (From cam.html) --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        .file-card {
            background: var(--card-gradient);
            border: var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0; animation: fadeUp 0.6s forwards;
        }
        
        .file-card:hover { transform: translateY(-6px); }

        .icon-box {
            width: 80px; height: 80px;
            background: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 32px;
        }

        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 30px; }

        .button-group { display: flex; gap: 12px; width: 100%; }
        
        .btn-action {
            flex: 1; padding: 12px 0; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer; border: none;
            transition: all 0.2s ease;
        }
        
        .btn-blue { background: #0071e3; color: white; box-shadow: 0 2px 5px rgba(0, 113, 227, 0.2); }
        .btn-blue:hover { background: #005bb5; transform: translateY(-1px); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .empty-state { grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px; font-size: 16px; }

    </style>
</head>
<body>

    <div id="library-view">
        <a href="index.html" class="nav-back-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>

        <div class="header">
            <h1>Engineering Drawings</h1>
            <p>Technical Drafting & GD&T Schematics</p>
        </div>

        <div class="controls-wrapper">
            <div class="segmented-control">
                <div class="segment-pill" id="segmentPill"></div>
                <button class="segment-btn active" onclick="setCategory(0, 'All', this)">All</button>
                <button class="segment-btn" onclick="setCategory(1, 'Drawing', this)">Drawings</button>
                <button class="segment-btn" onclick="setCategory(2, 'GD&T', this)">GD&T</button>
            </div>

            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search filenames..." onkeyup="filterFiles()">
            </div>
        </div>

        <div class="grid" id="gridContainer">
            </div>

    </div>

    <script>
        // --- YOUR EXACT ORIGINAL DATA & PATHS ---
        const myDrawings = [
            { displayName: "Motocross Helmet", pdfFile: "Motocross-Helmet.pdf", dwgFile: "Motocross-Helmet.dwg", folder: "Drawing", type: "Drawing", date: "Oct 24" },
            { displayName: "TOYOTA GT 2000", pdfFile: "TOYOTA GT 2000.pdf", dwgFile: "TOYOTA GT 2000.dwg", folder: "Drawing", type: "Drawing", date: "Nov 12" },
            { displayName: "Piston Assembly", pdfFile: "Piston assembly.pdf", dwgFile: "Piston assembly dwg.zip", folder: "GD&T", type: "GD&T", date: "Dec 05" },
            { displayName: "Gear Fidget", pdfFile: "Gear fidget assembly.pdf", dwgFile: "Gear fidget assembly dwg.zip", folder: "GD&T", type: "GD&T", date: "Jan 15" },
        ];

        const gridContainer = document.getElementById('gridContainer');
        const segmentPill = document.getElementById('segmentPill');
        let currentCategory = 'All';

        // --- FILTERING LOGIC ---
        function setCategory(index, cat, btn) {
            currentCategory = cat;
            
            // Move the Pill (Assuming button width is 120px)
            const offset = index * 120; 
            segmentPill.style.transform = `translateX(${offset}px)`;
            
            document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            filterFiles();
        }

        // --- RENDER GRID WITH CAM.HTML CARD STRUCTURE ---
        function renderGrid(data) {
            gridContainer.innerHTML = "";
            if (data.length === 0) {
                gridContainer.innerHTML = "<div class='empty-state'>No matching drawings found.</div>";
                return;
            }

            data.forEach((item, index) => {
                const isGDT = item.folder === 'GD&T';
                
                // Your exact original viewer logic
                const viewerLink = `drafting-viewer.html?folder=${encodeURIComponent(item.folder)}&pdf=${encodeURIComponent(item.pdfFile)}&dwg=${encodeURIComponent(item.dwgFile)}&name=${encodeURIComponent(item.displayName)}`;
                
                const delay = index * 0.05; 
                
                // Dynamic icons referencing the cam.html aesthetic
                const icon = isGDT ? '🎯' : '📐';

                const cardHTML = `
                    <div class="file-card" style="animation-delay: ${delay}s">
                        <div class="icon-box">${icon}</div>
                        <div class="card-title">${item.displayName}</div>
                        <div class="button-group">
                            <a href="${viewerLink}" class="btn-action btn-blue" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">View Drawing</a>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        function filterFiles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = myDrawings.filter(item => {
                const matchCategory = (currentCategory === 'All') || (item.folder === currentCategory);
                const matchSearch = item.displayName.toLowerCase().includes(query);
                return matchCategory && matchSearch;
            });
            renderGrid(filtered);
        }

        // Init
        renderGrid(myDrawings);
    </script>
</body>
</html>
