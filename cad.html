<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD Library | Vamshi Krishna</title>
    <style>
        /* --- UNIFIED APPLE SYSTEM THEME (MATCHING INDEX) --- */
        :root {
            --bg-color: #fbfbfd;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --accent-blue: #0071e3;
            --font-stack: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* The specific Platinum Gradient from your Index */
            --card-gradient: linear-gradient(180deg, #f5f5f7 0%, #e1e1e6 100%);
            --card-border: 1px solid rgba(255,255,255,0.8);
            --shadow-soft: 0 4px 6px rgba(0,0,0,0.02), 0 10px 15px rgba(0,0,0,0.03), inset 0 1px 0 rgba(255,255,255,0.9);
            --shadow-hover: 0 15px 35px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* --- NAVIGATION --- */
        .nav-back-home {
            position: absolute; top: 40px; right: 40px;
            display: flex; align-items: center; gap: 5px;
            color: var(--accent-blue); text-decoration: none; font-weight: 500;
        }
        .nav-back-home:hover { text-decoration: underline; }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease forwards; }
        .header h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; }
        .header p { font-size: 19px; color: var(--text-secondary); font-weight: 400; }

        /* --- TABS --- */
        .tabs-container {
            display: flex;
            justify-content: center;
            background: #e5e5ea;
            padding: 4px;
            border-radius: 980px;
            width: fit-content;
            margin: 0 auto 40px;
            animation: fadeUp 0.8s ease forwards;
        }
        
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .tab-btn.active {
            background: white;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        /* --- SEARCH --- */
        .search-container {
            max-width: 400px;
            margin: 0 auto 50px auto;
            position: relative;
            animation: fadeUp 0.9s ease forwards;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            background: #e3e3e8;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus { background: #dcdce0; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.5; width: 16px; }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            animation: fadeUp 1s ease forwards;
        }

        .file-card {
            background: var(--card-gradient);
            border: var(--card-border);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .file-card:hover { 
            transform: translateY(-6px); 
            box-shadow: var(--shadow-hover);
            filter: brightness(1.02);
        }

        .icon-preview {
            width: 80px; height: 80px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-preview svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        .file-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; color: var(--text-main); }
        .file-type { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="nav-back-home">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>
        
        <div class="header">
            <h1>CAD Library</h1>
            <p>SolidWorks & NX Models</p>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="setCategory('All')">All</button>
            <button class="tab-btn" onclick="setCategory('Surface')">Surface</button>
            <button class="tab-btn" onclick="setCategory('Solid')">Solid</button>
            <button class="tab-btn" onclick="setCategory('Sheet')">Sheet Metal</button>
        </div>

        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search models..." onkeyup="filterModels()">
        </div>

        <div class="grid" id="gridContainer"></div>
    </div>

    <script>
        // --- REAL WORLD LOGOS (SVG PATHS) ---
        const icons = {
            // Red Cube for SolidWorks
            solidworks: `<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" rx="12" fill="#d9232e"/><text x="50" y="65" font-family="Arial" font-weight="bold" font-size="28" fill="white" text-anchor="middle">SW</text></svg>`, 
            // Orange/White for NX
            nx: `<svg viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#FF7F00"/><path d="M30 70V30l40 40V30" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`, 
            // Fallback Blue
            generic: `<svg viewBox="0 0 24 24" fill="#0071e3"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15z"/></svg>`
        };

        const myFiles = [
            // --- SURFACE FILES (UPDATED) ---
            { displayName: "Toyota GT 2000", fileName: "TOYOTA GT 2000.glb", folder: "Surface", type: "GLB", tool: "NX 12" },
            { displayName: "Motocross Helmet", fileName: "Motocross_helmet.glb", folder: "Surface", type: "GLB", tool: "NX 12" },
            { displayName: "Motocross Goggles", fileName: "Motocross_goggles.glb", folder: "Surface", type: "GLB", tool: "NX 12" },
            
            // --- SOLID FILES ---
            { displayName: "Carving Knife", fileName: "Carving_knife.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Feed Check Valve", fileName: "Feed_check_valve.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Fork Holder", fileName: "Fork Holder.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Teeth Sprocket", fileName: "Teeth sprocket.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Ball Bearing", fileName: "Ball_bearing.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Beginner Part 013", fileName: "Blender-CAD_Beginner_013.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            { displayName: "Beginner Part 019", fileName: "Blender-CAD_Beginner_019.glb", folder: "Solid", type: "GLB", tool: "SolidWorks" },
            
            
            // Uploaded Surface Files (Set to SolidWorks)
            { displayName: "Earbuds", fileName: "Earbuds.glb", folder: "Surface", type: "GLB", tool: "SolidWorks" },
            { displayName: "Helmet", fileName: "Helmet.glb", folder: "Surface", type: "GLB", tool: "SolidWorks" },
            { displayName: "Mustang Elenor", fileName: "Mustang Elenor.glb", folder: "Surface", type: "GLB", tool: "SolidWorks" },
            { displayName: "Royal Enfield Tank", fileName: "Royal_enfield_petrol_tank.glb", folder: "Surface", type: "GLB", tool: "SolidWorks" },

            // --- SHEET METAL FILES ---
            { displayName: "Sheet Bracket", fileName: "Sheet Metal Bracket.glb", folder: "Sheet", type: "GLB", tool: "SolidWorks" },
            { displayName: "Power Box", fileName: "Power Box_Chassis.glb", folder: "Sheet", type: "GLB", tool: "SolidWorks" },
            { displayName: "Part 1", fileName: "Part1.glb", folder: "Sheet", type: "GLB", tool: "SolidWorks" }
        ];

        const gridContainer = document.getElementById('gridContainer');
        let currentCategory = 'All';

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(cat) || (cat === 'All' && btn.innerText === 'All')) {
                    btn.classList.add('active');
                }
            });
            filterModels();
        }

        function renderGrid(data) {
            gridContainer.innerHTML = ""; 
            if (data.length === 0) {
                gridContainer.innerHTML = "<p style='color:#86868b; grid-column: 1/-1; text-align:center;'>No models found.</p>";
                return;
            }

            data.forEach(model => {
                let iconSVG = icons.generic;
                if(model.tool && model.tool.includes("SolidWorks")) iconSVG = icons.solidworks;
                if(model.tool && model.tool.includes("NX")) iconSVG = icons.nx;

                const toolParam = encodeURIComponent(model.tool || "SolidWorks");
                const cardHTML = `
                    <a href="viewer.html?file=${encodeURIComponent(model.fileName)}&folder=${encodeURIComponent(model.folder)}&name=${encodeURIComponent(model.displayName)}&tool=${toolParam}" class="file-card">
                        <div class="icon-preview">
                            ${iconSVG}
                        </div>
                        <div class="file-name">${model.displayName}</div>
                        <div class="file-type">${model.tool}</div>
                    </a>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        function filterModels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = myFiles.filter(model => {
                const matchCategory = currentCategory === 'All' || model.folder === currentCategory;
                const matchSearch = model.displayName.toLowerCase().includes(query);
                return matchCategory && matchSearch;
            });
            renderGrid(filtered);
        }

        renderGrid(myFiles);
    </script>
</body>
</html>
